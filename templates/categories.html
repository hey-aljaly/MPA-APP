{% extends "base.html" %}
{% block content %}

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start;">

  <div class="card">
    <div class="card-header">
      <h2>Add Category</h2>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Category Name</label>
        <input type="text" name="name" placeholder="e.g. Food, Transport..." required>
      </div>
      <button type="submit" class="btn primary" style="width: 100%; justify-content: center;">
        Add Category
      </button>
    </form>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Your Categories</h2>
      <span style="font-size: 12px; color: var(--muted);">{{ categories|length }} total</span>
    </div>
    {% if categories %}
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Category</th>
        </tr>
      </thead>
      <tbody>
        {% for c in categories %}
        <tr>
          <td style="color: var(--muted); font-family: 'DM Mono', monospace;">{{ loop.index }}</td>
          <td><span class="tag tag-blue">{{ c[0] }}</span></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p style="color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0;">
      No categories yet. Add one to get started.
    </p>
    {% endif %}
  </div>

</div>

{% endblock %}
