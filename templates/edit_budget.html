{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width: 500px; margin:auto;">
  <h2>Edit Budget</h2>

  <form method="POST">
    <p><strong>{{ budget[0] }}</strong></p>

    <input type="number" step="0.01" name="limit" value="{{ budget[1] }}" required>

    <button type="submit" class="btn primary">Update</button>
  </form>
</div>

{% endblock %}
