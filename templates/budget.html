{% extends "base.html" %}
{% block content %}
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start;">

  <div class="card">
    <div class="card-header">
      <h2>Set Budget</h2>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" placeholder="e.g. Food, Transport..." required>
      </div>
      <div class="form-group">
        <label>Monthly limit (RM)</label>
        <input type="number" step="0.01" name="limit" placeholder="0.00" required>
      </div>
      <button type="submit" class="btn primary" style="width: 100%; justify-content: center;">
        Save Budget
      </button>
    </form>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Your Budgets</h2>
      <span style="font-size: 12px; color: var(--muted);">{{ budgets|length }} categories</span>
    </div>

    {% if budgets %}
    <table>
      <thead>
        <tr>
          <th>Category</th>
          <th>Limit</th>
          <th style="text-align: right;">Actions</th>
        </tr>
      </thead>
      
      <tbody>
        {% for b in budgets %}
        <tr>
          <td><span class="tag tag-blue">{{ b[0].title() }}</span></td>
          <td style="font-family: 'DM Mono', monospace; font-weight: 500;">RM {{ b[1] }}</td>
          <td style="text-align: right; white-space: nowrap;">

            <a href="/edit-budget/{{ b[0] }}" 
               style="margin-right:10px; color: #2563eb; font-weight: 500; text-decoration: none;">
               Edit
            </a>

            <a href="/delete-budget/{{ b[0] }}" 
               onclick="return confirm('Delete this budget?')"
               style="color: #ef4444; font-weight: 500; text-decoration: none;">
               Delete
            </a>

          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    {% else %}
    <p style="color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0;">
      No budgets set yet.
    </p>
    {% endif %}
  </div>

</div>

{% endblock %}
