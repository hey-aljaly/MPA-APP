{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width: 500px; margin:auto;">
  <h2>Edit Budget</h2>

  <form method="POST">
    <div class="form-group">
      <label>Budget Name</label>
      <input type="text" value="{{ budget[0] | title }}" disabled>
    </div>

    <div class="form-group">
      <label>Monthly Limit (RM)</label>
      <input type="number" step="0.01" name="limit" value="{{ budget[1] }}" required>
    </div>

    <div class="form-group">
      <label>Categories Included</label>
      <select name="categories" multiple required style="height: 140px;">
        {% for c in categories %}
          <option value="{{ c }}" {% if c in selected_categories %}selected{% endif %}>
            {{ c | title }}
          </option>
        {% endfor %}
      </select>
      <small style="color: var(--muted); font-size: 12px;">
        Hold CTRL / CMD to select multiple categories.
      </small>
    </div>

    <button type="submit" class="btn primary">Save Changes</button>
  </form>
</div>

{% endblock %}
