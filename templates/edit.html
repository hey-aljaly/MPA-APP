{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width: 500px; margin:auto;">
  <h2>Edit Transaction</h2>

  <form method="POST">

    <div class="form-group">
      <label>Amount</label>
      <input type="number" step="0.01" name="amount" value="{{ t[1] }}" required>
    </div>

    <div class="form-group">
      <label>Category</label>
    {% if is_tax_payment %}
      <input type="text" name="category" value="Taxes payment">
    {% else %}
      <select name="category">
        {% for c in categories %}
          <option value="{{ c }}" {% if c == t[3] %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
    {% endif %}
      </select>
    </div>

    <div class="form-group">
      <label>Note</label>
      <input type="text" name="note" value="{{ t[4] }}">
    </div>

    <button type="submit" class="btn primary">Save Changes</button>

  </form>
</div>

{% endblock %}
